# Config used by docker-compose: Redis-backed cache + rate limiting so the
# gateway is replica-safe. Works out of the box with the mock providers; add
# OPENAI_API_KEY / ANTHROPIC_API_KEY to .env to enable the hosted models.
server:
  host: 0.0.0.0
  port: 8080
  log_level: INFO

cache:
  enabled: true
  backend: redis
  redis_url: ${REDIS_URL:-redis://redis:6379/0}
  ttl_seconds: 3600
  semantic:
    enabled: true
    threshold: 0.92
    embedder: hashing
    max_entries: 5000

ratelimit:
  enabled: true
  backend: redis
  redis_url: ${REDIS_URL:-redis://redis:6379/0}
  default_rpm: 600
  burst: 120

routing:
  strategy: latency
  failure_threshold: 3
  cooldown_s: 15

providers:
  - name: mock-fast
    type: mock
    latency_ms: 40
    tokens_per_second: 1200
  - name: mock-smart
    type: mock
    latency_ms: 180
    tokens_per_second: 600
  - name: openai
    type: openai
    api_key: ${OPENAI_API_KEY:-}
  - name: anthropic
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY:-}

models:
  - name: demo
    deployments:
      - { provider: mock-fast,  model: mock-fast,  weight: 2, cost_per_1k_input: 0.0005, cost_per_1k_output: 0.0015 }
      - { provider: mock-smart, model: mock-smart, weight: 1, cost_per_1k_input: 0.003,  cost_per_1k_output: 0.006 }
  - name: gpt-4o
    deployments:
      - { provider: openai, model: gpt-4o, cost_per_1k_input: 0.005, cost_per_1k_output: 0.015 }
  - name: claude
    deployments:
      - { provider: anthropic, model: claude-3-5-sonnet-20241022, cost_per_1k_input: 0.003, cost_per_1k_output: 0.015 }
