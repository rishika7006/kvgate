name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,redis]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy src

      - name: Test
        run: pytest --cov=infergate --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t infergate:ci .
      - name: Smoke-test container
        run: |
          docker run -d --name ig -p 8080:8080 infergate:ci
          for i in $(seq 1 20); do
            if curl -sf localhost:8080/healthz; then echo "healthy"; break; fi
            sleep 1
          done
          curl -sf localhost:8080/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -d '{"model":"demo","messages":[{"role":"user","content":"ci"}]}' | grep -q chat.completion
          docker rm -f ig
